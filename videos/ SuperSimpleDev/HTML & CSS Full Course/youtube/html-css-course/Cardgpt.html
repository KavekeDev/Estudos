<!DOCTYPE html>
<html>

  <head>

    <title></title>

    <style>

      body {
        margin: 0;
        font-family: Arial;
        display: flex;
        justify-content: space-evenly;
      }

    .card {
      width: 250px;
      border: 1px solid;
      margin: 10px;
      display:inline-block;
      box-shadow: 1px 1px 6px;
    }

    .card-image {
      width: 100%;
      height: 150px;
      object-fit: cover;
      object-position: 0 -70px;
      border-bottom: 1px solid;
    }

    p {
      margin: 0;
    }

    .title {
      margin-top: 10px;
      margin-bottom: 10px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .description {
      margin-bottom: 20px;
      margin-left: 5px;
      margin-right: 5px;
      font-size: 16px;
    }


    .button-buy {
      display: block;
      margin: 10px auto;
      width: 80%;
      height: 40px;
      background-color: #008000;
      color: white;
      border-radius: 10px;
      border: none;
      font-size: large;
      cursor: pointer;
    }

    .button-buy:hover {
      background-color: #005f00;
    }

    .button-buy:active {
      background-color: #003d00;
    }

    </style>

  </head>

  <body>

    <div class="card">

      <img class="card-image" src="picapauanemico.webp">

      <p class="title">
        Pica Pau Anemico 100% Original
      </p>

      <p class="description">
        pica pau original vindo da coreia do sul, ele fala ele canta e ele grita, mas ele tem uma falha crucial, ele sempre esgota as baterias internas.
      </p>
      
      <button class="button-buy">Compre Agora</button>
     
    </div>

  </body>

</html>
