<!DOCTYPE html>

<html>

  <head>

    <title>Twitter text box</title>

    <style>

      .area-1 {
        width: 442px;
        padding: 10px;
        box-shadow: 1px 1px 6px;
        border-radius: 20px;
      }

      .profile-image {
        
        height: 50px;
        width: 50px;
        object-fit: cover;
        border-radius: 25px;
        vertical-align: middle;
        margin-right: 5px;
        box-shadow: 0px 0px 4.1px;
      }

      .input-text {
        vertical-align: middle;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        width: 300px;
      }

      .tweet-button {
        color: white;
        background-color: #4a99e9;
        border: none;
        border-radius: 30px;
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 16px;
        padding-right: 16px;
        vertical-align: middle;
        font-size: 16px;
      }
    </style>

  </head>

  <body>

    <div class="area-1">

    <img class="profile-image" src="IMG_20250910_174842.jpg">

    <input type="text" class="input-text" placeholder="What's happening?">

    <button class="tweet-button">Tweet</button>
  
    </div>

  </body>

</html>
