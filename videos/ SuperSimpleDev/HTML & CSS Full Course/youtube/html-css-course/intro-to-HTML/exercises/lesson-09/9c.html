<!DOCTYPE html>
<html>

  <head>

    <title>Satisfaction</title>

    <style>

    body {
      margin: 50px;
      font-family: Arial;
    }

    .box {
      margin: 0px;
      border: 1px solid;
      width: 250px;
    }

    .title {
      margin: 15px;
      font-size: 18px;
    }

    button {
      margin-bottom: 15px;
      cursor: pointer;
    }

    .btn-yes {
      margin-left: 15px;
    }

    </style>

  </head>

  <body>

    <div class="box">

      <p class="title">Satisfied with our service?</p>
      <button class="btn-yes">Yes</button>
      <button class="btn-no">No</button>

    </div>

  </body>

</html>
