<!DOCTYPE html>
<html>

  <head>

    <title></title>

    <style>

      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      div {
        text-align: center;
      }

      img {
        width: 200px;
        margin-top: 10px;
        margin-bottom: 10px;
      }

      input {
        border: none;
        padding-top: 12px;
        padding-bottom: 12px;
        padding-left: 16px;
        padding-right: 16px;
        border-radius: 30px;
        font-size: 16px;
        box-shadow: 0 0 6px rgba(0, 0, 0, .3);
        width: 500px;
        margin-bottom: 30px;
      }

      .google-button {
        background-color: rgb(245,245,245);
        border: none;
        font-size: 15px;
        padding-top: 12px;
        padding-bottom: 12px;
        padding-left: 16px;
        padding-right: 16px;
      }

      .search-button {
        margin-right: 10px;
      }
      
    </style>

  </head>

  <body>

    <div>
      <img class="google-logo" src="Google_2015_logo.svg.png">
    </div>
    <div>
      <input type="text" placeholder="Search Google or type a URL">
    </div>

    <div>
      <button class="google-button search-button">Google Search</button>
      <button class="google-button">I'm Feeling Lucky</button>
    </div>

  </body>

</html>
