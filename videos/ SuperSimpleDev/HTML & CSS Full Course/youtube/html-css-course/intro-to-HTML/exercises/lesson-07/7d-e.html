<!DOCTYPE html>

<html>

<head>

  <title>TextBox Lesson</title>

  <style>

    .regular-search {
      font-family: Arial;
      font-weight: bold;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid;
      border-color: #696969;
      display: block;
      margin-bottom: 20px;
    }

    .google-search {
      font-family: Arial;
      border: none;
      box-shadow: 1px 1px 5px #696969;
      border-radius: 20px;
      padding: 10px 0px;
      padding-left: 20px;
      padding-right: 200px;
    }

  </style>

</head>

<body>

<input class="regular-search" placeholder="Search">
<input class="google-search" placeholder="Search Google or type URL">

</body>

</html>
