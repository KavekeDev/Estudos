<!DOCTYPE html>

<html>

  <head>

    <title>
      Apple MacBook Pro
    </title>

    <style>

      p , button {
        font-family: Arial;
        margin-top: 0px;
        margin-bottom: 0px;
        text-align: center;
      }

      .announcement {
        color: rgb(245, 99, 0);
        font-weight: bold;
        margin-bottom: 10px;
      }

      .product {
        font-size: 26px;
        font-weight: bold;
        margin-bottom: 5px;
      }

      .title {
        font-size: 55px;
        font-weight: bold;
        margin-bottom: 15px;
      }

      .price {
        font-size: 20px;
        margin-top: 14px;
        margin-bottom: 25px;
      }

      .buy {
        background-color: rgb(0,113,227);
        color: white;
        padding-top: 7px;
        padding-bottom: 7px;
        padding-left: 14px;
        padding-right: 14px;
        border-radius: 30px;
        cursor: pointer;
      
      }

      .buy:hover {
        background-color: rgb(0, 90, 179);
      }

      .buy:active {
        background-color: rgb(0, 70, 140);
      }

    </style>

  </head>

  <body>
    
    <p class="announcement">
      New
    </p>

    <p class="product">
      MacBook Pro
    </p>

    <p class="title">
      Supercharged for pros.
    </p>

    <p class="price">
      From $1999
    </p>

    <p>
      <span class="buy">Buy</span>
    </p>

  </body>

</html>
