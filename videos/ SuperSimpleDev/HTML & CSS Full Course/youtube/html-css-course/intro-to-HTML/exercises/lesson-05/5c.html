<!DOCTYPE html>

<html>
  <head>
    <title>Font Verdana</title>

    <style>

      p {
        font-family: Verdana;
        margin-top: 0px;
        margin-bottom: 0px;
      }

      .title {
        font-size: 26px;
        font-weight: bold;
        margin-bottom: 4px;
      }

      .subtitle {
        font-size: 23px;
        color: rgb(92, 92, 92);
        margin-bottom: 20px;
      }

      .description {
        width: 350px;
        font-size: 20px;
        margin-bottom: 25px;
      }

      .start-button {
        background-color: rgb(56, 126, 35);
        color: white;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        padding: 15px 25px;
        cursor: pointer;
      }

    </style>

  </head>

  <body>

    <p class="title">
      HTML CSS Course
    </p>

    <p class="subtitle">
      Beginner to Pro
    </p>

    <p class="description">
      In this course, we'll learn the skills you need to become a developer.
    </p>

    <button class="start-button">
      Get Started
    </button>

  </body>

</html>
