<!DOCTYPE html>

<html>
  <head>
    <title>Font Arial</title>

    <style>

      p {
        margin-top: 0px;
        margin-bottom: 0px; 
        font-family: Arial;
      }

      .title {
        font-weight: bold;
        font-size: 26px;
        margin-bottom: 8px;
      }

      .announcement {
        font-size: 18px;
        font-style: italic;
        color: red;
      }

    </style>

  </head>

  <body>

    <p class="title">
      Biggest Deals of the Year!
    </p>

    <p class="announcement">
      Sales end Tuesday
    </p>

  </body>

</html>
