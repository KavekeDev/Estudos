<style>

  button:hover {
    opacity: 0.8;
  }

  .bootstrap-get-started-button {
    background-color: rgba(115, 84, 173);
    padding: 10px 20px;
    color: white;
    font-weight: bold;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  .bootstrap-get-started-button:hover {
    background-color: rgb(77, 50, 128);
  }
  
  .bootstrap-download-button {
    background-color: white;
    color: rgb(108, 117, 125);
    padding: 10px 20px;
    border: 1px solid rgb(108, 117, 125);
    border-radius:  4px;
    cursor: pointer;
    transition: background-color 0.2s, color 0.2s;
  }

  .bootstrap-download-button:hover {
    background-color: rgb(108, 117, 125);
    color: white;
  }

</style>

<button class="bootstrap-get-started-button">
  Get Started
</button>

<button class="bootstrap-download-button">
  Download
</button>
