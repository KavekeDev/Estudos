<style> 

  .linkedin-apply-button {
    background-color: rgb(37, 150, 190);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-right: 8px;
    transition: background-color 0.3s ease;
  }
  .linkedin-apply-button:hover {
    background-color: rgb(30, 120, 150);
  }

  .linkedin-save-button {
    padding: 10px 24px;
    background-color: white;
    color: rgb(37, 150, 190);
    border-style: solid;
    border-width: 1px;
    border-color: rgb(37, 150, 190);
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
    transition: outline 0.3s ease, outline-offset 0.3s ease;
  }
  .linkedin-save-button:hover {
  outline: 2px solid rgb(37,150,190);
  outline-offset: -2px;
}


</style>

<button class="linkedin-apply-button">
  Apply on company website
</button>

<button class="linkedin-save-button">
  Save
</button>
