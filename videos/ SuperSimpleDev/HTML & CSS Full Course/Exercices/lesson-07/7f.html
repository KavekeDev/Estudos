<!DOCTYPE html>

<html>

  <head>

    <title>Linkedin Signup</title>

    <style>

      p, input {
        margin: 0px;
      }

      .title {
        font-family: Arial;
        color: #3b3b3b;
        margin-bottom: 8px;
      }

      .email-box {
        font-size: 16px;
        width: 400px;
        border-width: 2px;
        border-style: solid;
        border-color: #696969;
        padding-top: 7px;
        padding-bottom: 7px;
        border-radius: 5px;
        margin-bottom: 20px;
      }

      .agreements {
        color: #3b3b3b;
        margin-bottom: 26px;
      }

      .agree-button {
        background-color: #2c64bb;
        color: white;
        border: none;
        padding: 16px 130px;
        font-size: 20px;
        border-radius: 20px;
        box-shadow: 2px 2px 10px #000000;
        cursor: pointer;
        }

    </style>
    
  </head>

  <body>

    <p class="title">
      Email
    </p>

    <input class="email-box">

    <p class="agreements">
      By clicking Agree & Join, you agree to the Privacy Policy.
    </p>

    <button class="agree-button">
      Agree & Join
    </button>

  </body>

<html></html>
