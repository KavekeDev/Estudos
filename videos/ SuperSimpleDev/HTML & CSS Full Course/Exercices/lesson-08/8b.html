<!DOCTYPE html>

<html>

  <title>Survey</title>

  <head>

    <style>

      .survey-text, .survey-button-yes, .survey-button-no {
        display: inline-block;
        font-family: Arial;
        vertical-align: middle;
      }

      .survey-text {
        width: 220px;
      }

      .survey-button-no , .survey-button-yes {
        cursor: pointer;
      }

    </style>

  </head>

  <body>
    
    <p class="survey-text">
      Thanks for chatting with our customer support. Would you like to take our quick survey?
    </p>

    <button class="survey-button-yes">
      Yes
    </button>

    <button class="survey-button-no">
      No
    </button>
  </body>

</html>
