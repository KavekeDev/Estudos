<!DOCTYPE html>
<html>

  <head>

    <title>Uber Request Ride</title>

    <style>

      p {
        font-family: Arial;
      }

      .title {
        font-size: 40px;
        margin-bottom: 25px;
      }

      input {
        display: block;
        background-color: rgb(240, 240, 240);
        border: none;
        margin-bottom: 10px;
        padding-top: 15px;
        padding-bottom: 15px;
        padding-left: 20px;
        padding-right: 20px;
        font-size: 16px;
        width: 400px;
      }

      .input-destination {
        margin-bottom: 35px;
      }

      button {
         border: none;
        padding-top: 15px;
        padding-bottom: 15px;
        padding-left: 25px;
        padding-right: 25px;
        font-size: 16px;
        cursor: pointer;
      }

      .request-button {
        background-color: black;
        color: white;
        margin-right: 20px;
      }
      
      .schedule-button {
        background-color: rgb(240,240,240);
      }

    </style>

  </head>

  <body>

    <p class="title">Request a ride now</p>

    <input class="input-location" placeholder="Enter pickup location">
    <input class="input-destination" placeholder="Enter destination">

    <button class="request-button">Request now</button>
    <button class="schedule-button" >Schedule for later</button>

  </body>

</html>
