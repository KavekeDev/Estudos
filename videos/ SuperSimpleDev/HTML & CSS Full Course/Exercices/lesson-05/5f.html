<!DOCTYPE html>

<html>

  <head>

    <title>
      Price Arial
    </title>

    <style>

      p {
        font-family: Arial;
        margin: 0px;
        margin-bottom: 6px;
      }

      .value {
        font-size: 32px;
      }

      .currency {
        font-size: 16px;
        color: rgb(120, 120, 120);
      }

      .infos {
        color: rgb(0, 128, 0);
        font-size: 16px;
      }

      .text {
        font-size: 16px;
        color: rgb(120, 120, 120);
      }

      .text-value {
        font-size: 16px;
        color: rgb(120, 120, 120);
      }

      .text-percentage {
        font-size: 16px;
        color: red;
      }

    </style>

  </head>

  <body>
    <p>

      <span class="value">
        1,049.61
      </span>

      <span class="currency">
        USD
      </span>

    </p>

    <p class="infos">
      +18.05 (1.75%) today
    </p>

    <p>
      <span class="text">
        After hours
      </span>

      <span class="text-value">
        1,048.00
      </span>

      <span class="text-percentage">
        -1.61 (0.15%)
      </span>
    </p>

  </body>

</html>
