<!DOCTYPE html>

<html>

  <head>

    <title>
      twitter copy
    </title>

    <style>

      p {
        font-family: Arial;
        text-align: left;
        margin: 0px;
      }

      .account-name {
        font-weight: bold;
           font-size: 16px;
      }

      .account-handle-top {
        font-weight: bold;
        background-color: none;
        color: #657786;
        cursor: pointer;
      }

      .account-handle:hover {
        text-decoration: underline
      }

      .time-stamp {
        color: #657786;
      }

      .tweet-page {
        font-size: 16px;
        margin-top: 10px;
        width: 500px;
      }

        .tweet-content {
          display: block;
          margin-bottom: 16px;
        }

      .account-handle-down {
         color: rgb(29, 155, 240);
      }

    </style>

  </head>

  <body>
    <p>

      <span class="account-name">
        freeCodeCamp.org
      </span>

      <span class="account-handle-top">
        @freeCodeCamp
      </span>

      <span class="time-stamp">
        1h
      </span>

    </p>

    <p class="tweet-page">

      <span class="tweet-content">
        As a web developer, you'll want to make your projects easy to use and navigate around.
      </span>
 
      <span class="tweet-content">
        here
        <span class="account-handle-down">
          @fchp_it
        </span>
        outlines the top skills new developers should have.

      </span>

    </p>

  </body>

</html>
