<!DOCTYPE html>
<html>

  <head>

    <title></title>

    <style>

    p {
      font-family: Arial;
      margin-top: 0;
      margin-bottom: 0;
    }

    .profile-recomendation {
      width: 200px;
      box-shadow: 0 0 6px black;
      display: inline-block;
      margin-right: 15px;
      vertical-align: top;
    }

    .image {
      width: 200px;
      height: 200px;
      object-fit: cover;
      margin-bottom: 12px;
    }

    .display-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
      margin-left: 8px;
    }

    .mutual-friends {
      color: rgb(100,100,100);
      margin-left: 8px;
      margin-bottom: 12px;
    }

    .friend-solicitation {
      padding: 10px 20px;
      background-color: rgb(24,119,242);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      margin-left: 8px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .friend-solicitation:hover {
      background-color: rgb(8, 82, 180);
    }

    .friend-solicitation:active {
      background-color: rgb(5, 50, 109);
    }

    </style>

  </head>

  <body>

    <div class="profile-recomendation">
      <img class="image" src="IMG_20250910_174842.jpg">
      <p class="display-name">Momoi Da minha vida</p>
      <p class="mutual-friends">7 mutual friends</p>
      <button class="friend-solicitation">Add Friend</button>
    </div>

    <div class="profile-recomendation">
      <img class="image" src="IMG_20250910_174842.jpg">
      <p class="display-name">Momoi Da minha vida</p>
      <p class="mutual-friends">7 mutual friends</p>
      <button class="friend-solicitation">Add Friend</button>
    </div>

    <div class="profile-recomendation">
      <img class="image" src="IMG_20250910_174842.jpg">
      <p class="display-name">Momoi Da minha vida</p>
      <p class="mutual-friends">7 mutual friends</p>
      <button class="friend-solicitation">Add Friend</button>
    </div>

  </body>

</html>
